analysis_target: trigger_track_step_state_table
status: inferred_for_out_of_scope_expansion
confirmed_in_this_dataset:
  trigger_record:
    track_byte_0_at_21720: zero_based_track_index
    step_byte_1_at_21721: zero_based_step_index
  step_state_table:
    decoded_entry_size: 2
    decoded_offset_formula: "4 + 1187 * track_index + 2 * step_index"
    normal_trigger_values:
      odd_steps: [0x03, 0x81]
      even_steps: [0x03, 0x91]
physical_diff_interpretation:
  note: >
    Raw physical diffs may appear as three-byte changes because one byte can be
    a 7-bit packing control byte, not semantic step-state payload.
remaining_open_questions:
  - Track 9+ behavior if the usable track range is expanded.
  - Multiple notes at same track/step (chord representation).
  - Trig Condition / Probability impact on decoded 2-byte step state.
  - Micro Timing encoding location and semantics.
  - Track default velocity/length mapping for tracks 2..8.
recommended_next_experiment_when_needed:
  - Full step walk (1..16) on at least one additional track beyond 8.
  - Controlled diffs for condition/probability and micro timing with fixed note.
