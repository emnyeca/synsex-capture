- id: primary_shadow_mirror
  requirement: primary 16 decoded bytes must equal shadow 16 decoded bytes in every case.

- id: allowed_diff_scope
  requirement: No changes outside Name-related packed data and checksum fields.
  allowed_categories:
  - primary name-region packed payload bytes
  - primary name-region packed control bytes
  - shadow name-region packed payload bytes
  - shadow name-region packed control bytes
  - checksum field bytes
  notes:
  - Control-byte deltas are expected whenever any decoded name byte in a packed group has bit7 set.
  - Extended chars (0x80+) therefore legitimately change control bytes in both primary and shadow groups.

- id: extended_sequence
  requirement: Case 024 must decode to C5 C4 D6 DC DF C6 D8 C7 D1 in both primary and shadow.

